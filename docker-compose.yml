version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: exam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: exam
      POSTGRES_PASSWORD: exam
      POSTGRES_DB: exam_paper_system
    ports:
      - "5432:5432"
    volumes:
      - exam-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exam -d exam_paper_system"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  exam-postgres-data:
