server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # nginx's stock mime.types has no entry for .mjs, so ES-module assets
  # (pdf.js emits its worker as pdf.worker.min-*.mjs) were served as
  # application/octet-stream — browsers refuse module scripts with a
  # non-JS MIME, which broke every PDF preview in production. Scoped to
  # its own location because `types` REPLACES (not merges) the inherited
  # map — at server level it would wipe js/css/png MIME for the whole site.
  location ~* \.mjs$ {
    types { application/javascript mjs; }
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  location ~* \.(js|css|svg|png|jpg|jpeg|gif|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }
}
